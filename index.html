<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence of Returns Simulator</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%20role%3D%22img%22%20aria-label%3D%22Finance%20simulator%22%3E%20%3Cdefs%3E%20%3ClinearGradient%20id%3D%22area%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%220%22%20y2%3D%221%22%3E%20%3Cstop%20offset%3D%220%25%22%20stop-color%3D%22%23ffffff%22%20stop-opacity%3D%220.4%22%2F%3E%20%3Cstop%20offset%3D%22100%25%22%20stop-color%3D%22%23ffffff%22%20stop-opacity%3D%220%22%2F%3E%20%3C%2FlinearGradient%3E%20%3C%2Fdefs%3E%20%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%227%22%20fill%3D%22%234f46e5%22%2F%3E%20%3Cpath%20d%3D%22M6%2023V17.5L11.5%2014L16.5%2017L24.5%209.5V23H6Z%22%20fill%3D%22url(%23area)%22%2F%3E%20%3Cpath%20d%3D%22M6%2017.5L11.5%2014L16.5%2017L24.5%209.5%22%20fill%3D%22none%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%222.2%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%20%3Ccircle%20cx%3D%2224.5%22%20cy%3D%229.5%22%20r%3D%221.75%22%20fill%3D%22%23ffffff%22%2F%3E%20%3C%2Fsvg%3E">
    <meta name="theme-color" content="#4f46e5">
    <script>
      (function () {
        var stored = localStorage.getItem('sor:theme');
        var dark =
          stored === 'dark' ||
          (stored !== 'light' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-theme-page text-theme-heading flex items-center justify-center min-h-screen p-4 py-12 transition-colors">

    <div class="w-full max-w-[1400px] xl:max-w-[1600px] 2xl:max-w-[1800px] bg-theme-surface rounded-2xl shadow-lg p-6 md:p-8 space-y-8 transition-colors">

        {{> header }}

        <!-- Input Parameters Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-x-12">
            <!-- Left Column: Primary Inputs -->
            <div class="space-y-6">
            {{> general }}
            {{> history }}
            {{> allocation }}
            </div>

            <!-- Right Column: Dynamic Parameters & Portfolio Setup -->
            <div class="space-y-6 lg:pl-12 lg:border-l border-theme-border">
            {{> withdrawal }}
            </div>
        </div>

        {{> goalSeek }}

        <!-- Action Button -->
        <div class="text-center">
            <button id="runButton" class="bg-theme-accent text-theme-on-accent font-bold rounded-lg shadow-md hover:bg-theme-accent-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-theme-accent focus:ring-offset-theme-ring-offset px-10 py-4 transition-all duration-300 text-lg"
            >Run Simulation</button>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden space-y-8">
            <div id="goalSeekWarning" class="hidden rounded-lg border border-theme-p20/40 bg-theme-muted px-4 py-3" role="status">
                <p class="text-sm text-theme-body">
                    <span class="font-semibold text-theme-p20">Goal not reached — </span>
                    <span id="goalSeekWarningMessage"></span>
                </p>
            </div>
            {{> metrics }}
            {{> charts }}
        </div>

    {{> loading }}

    </div>

    {{> dialogs }}

    <script type="module" src="/src/main.js"></script>
</body>
</html>
