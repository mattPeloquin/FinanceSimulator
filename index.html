<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence of Returns Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 text-slate-800 flex items-center justify-center min-h-screen p-4 py-12">

    <div class="w-full max-w-[1400px] xl:max-w-[1600px] 2xl:max-w-[1800px] bg-white rounded-2xl shadow-lg p-6 md:p-8 space-y-8">

        {{> header }}

        <!-- Input Parameters Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-x-12">
            <!-- Left Column: Primary Inputs -->
            <div class="space-y-6">
            {{> general }}
            {{> history }}
            {{> allocation }}
            </div>

            <!-- Right Column: Dynamic Parameters & Portfolio Setup -->
            <div class="space-y-6 lg:pl-12 lg:border-l border-slate-200">
            {{> withdrawal }}
            {{> lognormal }}
            </div>
        </div>

        <!-- Action Button -->
        <div class="text-center">
            <button id="runButton" class="bg-indigo-600 text-white font-bold rounded-lg shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 px-10 py-4 transition-all duration-300 text-lg"
            >Run Simulation</button>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden space-y-8">
            {{> metrics }}
            {{> charts }}
        </div>

    {{> loading }}

    </div>

    {{> dialogs }}

    <script type="module" src="/src/main.js"></script>
</body>
</html>
