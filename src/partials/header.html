<!-- Header Section -->
<div class="flex items-start justify-between gap-4 flex-wrap">
    <div class="flex-1 min-w-[260px]">
        <h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 text-center">Sequence of Returns Simulator</h1>
        <p class="text-slate-600 dark:text-slate-400 text-center mt-2">Monte Carlo analysis of returns, inflation, and dynamic withdrawals.</p>
    </div>
    <!-- Session controls -->
    <div id="session-controls" class="flex items-center gap-2 text-sm">
        <button id="themeToggle" type="button" aria-pressed="false" aria-label="Switch to dark mode" title="Toggle dark mode" class="p-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors shrink-0">
            <svg class="w-5 h-5 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            <svg class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
        <select id="sessionSelect" class="rounded-md border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-100 shadow-sm text-sm p-2 max-w-[180px]">
            <option value="">Unsaved session</option>
        </select>
        <button id="saveSessionButton" class="bg-slate-600 text-white font-semibold rounded-lg shadow-sm hover:bg-slate-700 px-3 py-2 transition-all">Save</button>
        <button id="deleteSessionButton" class="bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-300 font-semibold rounded-lg shadow-sm hover:bg-slate-50 dark:hover:bg-slate-600 px-3 py-2 transition-all">Delete</button>
        <button id="exportSessionButton" class="bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-300 font-semibold rounded-lg shadow-sm hover:bg-slate-50 dark:hover:bg-slate-600 px-3 py-2 transition-all">Export</button>
        <button id="importSessionButton" class="bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-300 font-semibold rounded-lg shadow-sm hover:bg-slate-50 dark:hover:bg-slate-600 px-3 py-2 transition-all">Import</button>
        <input type="file" id="importFileInput" accept="application/json" class="hidden">
    </div>
</div>
