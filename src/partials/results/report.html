<!-- Plan Snapshot: one-page printable report (initially closed) -->
<details id="details-plan-report" class="group border rounded-lg">
    <summary class="cursor-pointer select-none px-4 py-3 font-semibold text-theme-body flex items-center justify-between">
        <span>Plan Snapshot (one-page report)</span>
        <svg class="w-4 h-4 text-theme-faint transition-transform group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
    </summary>
    <div class="px-4 pb-4">
        <div id="reportControls" class="flex flex-wrap items-center justify-between gap-3 mb-3 print:hidden">
            <div class="inline-flex flex-wrap items-center gap-x-2 gap-y-1 text-xs text-theme-faint">
                <label class="inline-flex items-center gap-1" title="Lower end of the withdrawal / balance band">
                    <span>Show from</span>
                    <input type="range" id="reportPxLow" min="0" max="45" step="5" value="10" class="range-theme w-14">
                    <span id="reportPxLowLabel" class="w-9">P10</span>
                </label>
                <label class="inline-flex items-center gap-1" title="Upper end of the withdrawal / balance band">
                    <span>to</span>
                    <input type="range" id="reportPxHigh" min="55" max="100" step="5" value="90" class="range-theme w-14">
                    <span id="reportPxHighLabel" class="w-9">P90</span>
                </label>
            </div>
            <button type="button" id="reportExportPdf" class="px-3 py-1.5 text-xs font-semibold rounded-md border border-theme-border bg-theme-muted text-theme-heading hover:bg-theme-page transition-colors">
                Export PDF
            </button>
        </div>

        <div id="planReport" class="report-page bg-theme-surface text-theme-body print:bg-white rounded-lg border border-theme-border print:border-0 shadow-sm print:shadow-none mx-auto max-w-[760px] p-5 print:p-0 space-y-5">
            <!-- Header -->
            <div class="report-block flex items-end justify-between gap-3 flex-wrap border-b-2 border-theme-accent/60 print:border-slate-800 pb-2">
                <div>
                    <h3 class="text-lg font-bold tracking-wide uppercase text-theme-heading print:text-slate-900">Plan Snapshot</h3>
                    <p id="reportHeaderLine1" class="text-sm font-semibold text-theme-muted print:text-slate-700 mt-0.5"></p>
                </div>
                <p id="reportHeaderLine2" class="text-xs text-theme-faint print:text-slate-500 text-right"></p>
            </div>

            <!-- Verdict + gauges -->
            <div class="report-block grid grid-cols-1 sm:grid-cols-5 gap-4">
                <div class="sm:col-span-3">
                    <h4 class="report-heading text-[10px] uppercase tracking-wider font-semibold text-theme-accent-text print:text-slate-500 mb-1.5">Verdict</h4>
                    <div id="reportVerdictText" class="text-[13px] text-theme-body print:text-slate-800 leading-relaxed space-y-1.5"></div>
                </div>
                <div class="sm:col-span-2 space-y-2 rounded-md bg-theme-muted/60 print:bg-transparent p-2 print:p-0">
                    <div class="h-28 relative">
                        <canvas id="reportSuccessDonut"></canvas>
                    </div>
                    <div class="h-20 relative">
                        <canvas id="reportFourPctBars"></canvas>
                    </div>
                    <div class="h-10 relative">
                        <canvas id="reportSequenceBullet"></canvas>
                    </div>
                </div>
            </div>

            <!-- Withdrawals band -->
            <div class="report-block">
                <div class="flex items-baseline justify-between gap-2 mb-1.5">
                    <h4 class="report-heading text-[10px] uppercase tracking-wider font-semibold text-theme-accent-text print:text-slate-500">Withdrawals to expect</h4>
                    <span class="text-[10px] text-theme-faint print:text-slate-500"><span id="reportBandLabel"></span><span id="reportBandTaxNote" class="hidden"> · gross (before taxes)</span></span>
                </div>
                <div class="h-[2.4in] w-full relative">
                    <canvas id="reportBandCanvas" class="w-full h-full"></canvas>
                </div>
                <div id="reportBandLegend" class="flex flex-wrap items-center gap-x-4 gap-y-1 text-[10px] text-theme-faint print:text-slate-500 mt-1.5">
                    <span class="inline-flex items-center gap-1.5"><span class="report-median-swatch inline-block w-4 h-0.5" style="background:rgb(var(--theme-text-heading))"></span> Median</span>
                    <span class="inline-flex items-center gap-1.5"><span class="inline-block w-4 h-0" style="border-top:2px dashed #9ca3af"></span> Planned</span>
                    <span class="inline-flex items-center gap-1.5"><span class="inline-block w-8 h-3 rounded-sm" style="background:linear-gradient(90deg,#e66101,#9894b0,#0d9488)"></span> cut &lt; plan &lt; boost</span>
                    <span class="inline-flex items-center gap-1.5"><span class="inline-block w-3 h-3 rounded-sm" style="background:rgb(220,38,38)"></span> depleted</span>
                    <span>opacity = share of simulations</span>
                </div>
            </div>

            <!-- Balance fan + depletion -->
            <div class="report-block grid grid-cols-1 sm:grid-cols-5 gap-4">
                <div class="sm:col-span-3">
                    <h4 class="report-heading text-[10px] uppercase tracking-wider font-semibold text-theme-accent-text print:text-slate-500 mb-1.5">Balance outlook</h4>
                    <div class="h-[1.6in] relative">
                        <canvas id="reportFanCanvas"></canvas>
                    </div>
                </div>
                <div class="sm:col-span-2">
                    <h4 class="report-heading text-[10px] uppercase tracking-wider font-semibold text-theme-accent-text print:text-slate-500 mb-1.5">If plans fail, when?</h4>
                    <div id="reportDepletionNote" class="hidden text-xs text-theme-muted print:text-slate-600 leading-relaxed py-4"></div>
                    <div id="reportDepletionChartWrap" class="h-[1.6in] relative">
                        <canvas id="reportDepletionCanvas"></canvas>
                    </div>
                </div>
            </div>

            <!-- Your plan + allocation -->
            <div class="report-block grid grid-cols-1 sm:grid-cols-4 gap-4 border-t border-theme-border print:border-slate-300 pt-3">
                <div class="sm:col-span-3">
                    <h4 class="report-heading text-[10px] uppercase tracking-wider font-semibold text-theme-accent-text print:text-slate-500 mb-1.5">Your plan</h4>
                    <ul id="reportPlanBullets" class="text-xs text-theme-body print:text-slate-800 list-disc pl-4 space-y-1 columns-1 sm:columns-2 gap-6"></ul>
                </div>
                <div class="sm:col-span-1">
                    <h4 class="report-heading text-[10px] uppercase tracking-wider font-semibold text-theme-accent-text print:text-slate-500 mb-1.5 text-center">Allocation</h4>
                    <div class="h-32 relative">
                        <canvas id="reportAllocationDonut"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</details>
