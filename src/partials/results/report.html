<!-- Plan Snapshot: one-page printable report (initially closed) -->
<details id="details-plan-report" class="group border rounded-lg">
    <summary class="cursor-pointer select-none px-4 py-3 font-semibold text-theme-body flex items-center gap-3">
        <span class="min-w-0 flex-1">Plan Snapshot (one-page report)</span>
        <span class="ml-auto flex items-center gap-2 shrink-0">
            <img id="planReportThumb" alt="" class="h-10 w-[4.5rem] rounded border border-theme-border object-cover bg-theme-page group-open:hidden" hidden>
            <svg class="w-4 h-4 text-theme-faint transition-transform group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </span>
    </summary>
    <div class="px-4 pb-4">
        <div id="reportControls" class="flex flex-wrap items-center justify-between gap-3 mb-3 print:hidden">
            <div class="inline-flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-theme-faint">
                <label class="inline-flex items-center gap-1" title="Lower end of the withdrawal / balance band">
                    <span>Show from</span>
                    <input type="range" id="reportPxLow" min="0" max="45" step="5" value="10" class="range-theme w-14">
                    <span id="reportPxLowLabel" class="w-9">P10</span>
                </label>
                <label class="inline-flex items-center gap-1" title="Upper end of the withdrawal / balance band">
                    <span>to</span>
                    <input type="range" id="reportPxHigh" min="55" max="100" step="5" value="90" class="range-theme w-14">
                    <span id="reportPxHighLabel" class="w-9">P90</span>
                </label>
                <label class="inline-flex items-center gap-1" title="Report appearance on screen — independent of the app's theme">
                    <span>Appearance</span>
                    <select id="reportThemeMode" class="input-theme text-xs py-1 pl-1.5 pr-1">
                        <option value="auto">Match app</option>
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                    </select>
                </label>
            </div>
            <button type="button" id="reportExportPdf" class="px-3 py-1.5 text-xs font-semibold rounded-md border border-theme-border bg-theme-muted text-theme-heading hover:bg-theme-page transition-colors">
                Export PDF
            </button>
        </div>

        <div id="planReport" class="report-page bg-theme-page text-theme-body print:bg-white rounded-xl border border-theme-border print:border-0 mx-auto max-w-[820px] p-3 print:p-0 space-y-2.5">
            <!-- Bento grid: each row below is its own mosaic band, mirroring the
                 report's planned layout (verdict+gauges, then the withdrawal
                 hero full-width, then balance/depletion, then plan/allocation). -->
            <div class="space-y-2.5">
                <!-- Row 1: Verdict (left, ~60%) + stacked gauges (right, ~40%) -->
                <div class="grid grid-cols-1 md:grid-cols-12 print:grid-cols-12 gap-2.5 items-stretch">
                    <div class="report-card md:col-span-7 print:col-span-7 !bg-theme-accent-subtle print:!bg-transparent flex flex-col">
                        <div class="flex items-start justify-between gap-3">
                            <div class="flex items-center gap-2">
                                <span class="inline-block w-2 h-6 rounded-sm bg-theme-accent print:bg-slate-800" aria-hidden="true"></span>
                                <div>
                                    <h3 class="text-base font-bold tracking-tight text-theme-heading print:text-slate-900 leading-tight">Plan Snapshot</h3>
                                    <p id="reportHeaderLine1" class="text-[11px] font-medium text-theme-muted print:text-slate-600 leading-snug"></p>
                                </div>
                            </div>
                            <p id="reportHeaderLine2" class="text-[10px] text-theme-faint print:text-slate-500 text-right shrink-0"></p>
                        </div>
                        <h4 class="report-heading mt-2">Verdict</h4>
                        <div class="flex items-baseline gap-1.5 mt-0.5">
                            <span id="reportHeroSuccess" class="text-3xl leading-none font-extrabold text-theme-heading print:text-slate-900">—</span>
                            <span class="text-[10px] text-theme-muted print:text-slate-600">not depleted</span>
                            <span id="reportVerdictPill" class="inline-flex ml-auto px-1.5 py-0.5 rounded-full border text-[10px] font-semibold"></span>
                        </div>

                        <div id="reportVerdictText" class="text-[10.5px] text-theme-body print:text-slate-800 leading-snug space-y-1 mt-2"></div>
                    </div>

                    <div class="md:col-span-5 print:col-span-5 flex flex-col gap-2.5">
                        <div class="report-card flex flex-col">
                            <h4 class="report-heading mb-1">Plan gauges</h4>
                            <div class="h-[0.9in] relative">
                                <canvas id="reportSuccessDonut" class="w-full h-full"></canvas>
                            </div>
                        </div>
                        <div class="report-card flex flex-col flex-1">
                            <h4 class="report-heading mb-1">Your plan vs. the classic 4% rule</h4>
                            <div class="h-[0.95in] relative">
                                <canvas id="reportFourPctBars"></canvas>
                            </div>
                            <div id="reportFourPctLegend" class="flex flex-wrap items-center gap-x-3 gap-y-0.5 mt-0.5"></div>
                        </div>
                    </div>
                </div>

                <!-- Row 2: withdrawals hero, full width -->
                <div class="report-card flex flex-col">
                    <div class="flex items-baseline justify-between gap-2 mb-1">
                        <h4 class="report-heading">Withdrawals to expect</h4>
                        <span class="text-[9px] text-theme-faint print:text-slate-500"><span id="reportBandLabel"></span><span id="reportBandTaxNote" class="hidden"> · gross (before taxes)</span></span>
                    </div>
                    <div class="h-[2.4in] w-full relative">
                        <canvas id="reportBandCanvas" class="w-full h-full"></canvas>
                    </div>
                    <div id="reportBandLegend" class="flex flex-wrap items-center gap-x-3 gap-y-0.5 mt-1">
                        <span class="report-legend-dot"><span class="report-median-swatch inline-block w-4 h-0.5" style="background:rgb(var(--theme-text-heading))"></span> Median</span>
                        <span class="report-legend-dot"><span class="inline-block w-4 h-0" style="border-top:2px dashed #9ca3af"></span> Planned</span>
                        <span class="report-legend-dot"><span class="inline-block w-8 h-3 rounded-sm" style="background:linear-gradient(90deg,#e66101,#9894b0,#0d9488)"></span> cut &lt; plan &lt; boost</span>
                        <span class="report-legend-dot"><span class="inline-block w-3 h-3 rounded-sm" style="background:rgb(220,38,38)"></span> depleted</span>
                        <span class="report-legend-dot">opacity = density</span>
                    </div>
                </div>

                <!-- Row 3: balance outlook (~55%) + depletion timing (~45%) -->
                <div class="grid grid-cols-1 md:grid-cols-12 print:grid-cols-12 gap-2.5 items-stretch">
                    <div class="report-card md:col-span-7 print:col-span-7 flex flex-col">
                        <h4 class="report-heading mb-1">Balance outlook</h4>
                        <div class="h-[1.6in] relative">
                            <canvas id="reportFanCanvas"></canvas>
                        </div>
                    </div>
                    <div class="report-card md:col-span-5 print:col-span-5 flex flex-col">
                        <h4 class="report-heading mb-1">If plans fail, when?</h4>
                        <div id="reportDepletionNote" class="hidden text-[10px] text-theme-muted print:text-slate-600 leading-relaxed py-2"></div>
                        <div id="reportDepletionChartWrap" class="h-[1.6in] relative">
                            <canvas id="reportDepletionCanvas"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Row 4: your plan bullets (~75%) + allocation (~25%) -->
                <div class="grid grid-cols-1 md:grid-cols-12 print:grid-cols-12 gap-2.5 items-stretch">
                    <div class="report-card md:col-span-9 print:col-span-9 flex flex-col">
                        <h4 class="report-heading mb-1">Your plan</h4>
                        <ul id="reportPlanBullets" class="text-[10px] text-theme-body print:text-slate-800 list-disc pl-3.5 space-y-0.5 columns-1 sm:columns-2 gap-6"></ul>
                    </div>
                    <div class="report-card md:col-span-3 print:col-span-3 flex flex-col">
                        <h4 class="report-heading mb-1 text-center">Allocation</h4>
                        <div class="h-[1in] relative">
                            <canvas id="reportAllocationDonut"></canvas>
                        </div>
                        <div id="reportAllocationLegend" class="flex flex-wrap items-center justify-center gap-x-2 gap-y-0.5 mt-0.5"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</details>
