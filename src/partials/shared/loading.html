<!-- Loading Indicator -->
<div id="loadingIndicator" class="hidden flex-col items-center justify-center space-y-4 py-10">
    <div class="spinner"></div>
    <p id="loadingText" class="text-theme-muted">Running simulations, calculating paths...</p>
    <div class="w-64 bg-theme-border rounded-full h-2 overflow-hidden">
        <div id="progressBar" class="bg-theme-accent h-2 transition-all duration-150" style="width: 0%"></div>
    </div>
    <button id="cancelSimulationButton" class="px-4 py-2 bg-theme-surface border border-theme-input text-theme-body rounded-lg hover:bg-theme-muted text-sm font-medium transition-colors">Cancel</button>
</div>
