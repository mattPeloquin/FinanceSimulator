<!-- Loading Indicator -->
<div id="loadingIndicator" class="hidden flex-col items-center justify-center space-y-4 py-10">
    <div class="spinner"></div>
    <p id="loadingText" class="text-slate-600">Running simulations, calculating paths...</p>
    <div class="w-64 bg-slate-200 rounded-full h-2 overflow-hidden">
        <div id="progressBar" class="bg-indigo-600 h-2 transition-all duration-150" style="width: 0%"></div>
    </div>
    <button id="cancelSimulationButton" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 text-sm font-medium transition-colors">Cancel</button>
</div>
