<!-- Custom Dialogs -->
<dialog id="messageDialog" class="p-6 rounded-xl shadow-2xl border-0 backdrop:bg-slate-900/50 min-w-[320px] max-w-md">
    <h3 id="messageDialogTitle" class="text-lg font-bold text-slate-900 mb-2">Notice</h3>
    <p id="messageDialogText" class="text-sm text-slate-600 mb-6 whitespace-pre-line"></p>
    <div class="flex justify-end">
        <button id="messageDialogOk" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium shadow-sm transition-colors">OK</button>
    </div>
</dialog>

<dialog id="saveSessionDialog" class="p-6 rounded-xl shadow-2xl border-0 backdrop:bg-slate-900/50 min-w-[320px]">
    <h3 class="text-lg font-bold text-slate-900 mb-4">Save Session</h3>
    <label for="saveSessionName" class="block text-sm font-medium text-slate-700 mb-1">Session Name</label>
    <input type="text" id="saveSessionName" class="w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border mb-6" placeholder="My Scenario">
    <div class="flex justify-end gap-3">
        <button id="cancelSaveSession" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 text-sm font-medium transition-colors">Cancel</button>
        <button id="confirmSaveSession" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium shadow-sm transition-colors">Save</button>
    </div>
</dialog>

<dialog id="confirmDeleteDialog" class="p-6 rounded-xl shadow-2xl border-0 backdrop:bg-slate-900/50 min-w-[320px]">
    <h3 class="text-lg font-bold text-slate-900 mb-2">Delete Session</h3>
    <p id="deleteSessionText" class="text-sm text-slate-600 mb-6">Are you sure you want to delete this session?</p>
    <div class="flex justify-end gap-3">
        <button id="cancelDeleteSession" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 text-sm font-medium transition-colors">Cancel</button>
        <button id="confirmDeleteSession" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm font-medium shadow-sm transition-colors">Delete</button>
    </div>
</dialog>

<dialog id="withdrawalChartDialog" class="p-6 rounded-xl shadow-2xl border-0 backdrop:bg-slate-900/50 w-[90vw] max-w-4xl h-[80vh] max-h-[800px]">
    <div class="flex flex-col h-full">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h3 class="text-lg font-bold text-slate-900" id="withdrawalChartDialogTitle">Withdrawal Analysis</h3>
                <div id="withdrawalChartDialogSubtitle" class="text-sm font-normal text-slate-500 mt-1"></div>
            </div>
            <div class="flex items-center gap-4">
                <div id="withdrawalChartDialogAvgReturn" class="text-sm text-slate-500"></div>
                <button onclick="document.getElementById('withdrawalChartDialog').close()" class="text-slate-400 hover:text-slate-600 p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div class="flex-1 relative min-h-0 w-full">
            <canvas id="largeWithdrawalCanvas"></canvas>
        </div>
    </div>
</dialog>
