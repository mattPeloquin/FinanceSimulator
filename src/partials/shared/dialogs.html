<!-- Custom Dialogs -->
<dialog id="messageDialog" class="p-6 rounded-xl shadow-2xl border border-theme-border bg-theme-surface backdrop:bg-theme-page/50 min-w-[320px] max-w-md">
    <h3 id="messageDialogTitle" class="text-lg font-bold text-theme-heading mb-2">Notice</h3>
    <p id="messageDialogText" class="text-sm text-theme-muted mb-6 whitespace-pre-line"></p>
    <div class="flex justify-end">
        <button id="messageDialogOk" class="px-4 py-2 bg-theme-accent text-theme-on-accent rounded-lg hover:bg-theme-accent-hover text-sm font-medium shadow-sm transition-colors">OK</button>
    </div>
</dialog>

<dialog id="saveSessionDialog" class="p-6 rounded-xl shadow-2xl border border-theme-border bg-theme-surface backdrop:bg-theme-page/50 min-w-[320px]">
    <h3 class="text-lg font-bold text-theme-heading mb-4">Save Session</h3>
    <label for="saveSessionName" class="block text-sm font-medium text-theme-body mb-1">Session Name</label>
    <input type="text" id="saveSessionName" class="w-full rounded-md input-theme sm:text-sm p-2 border mb-6" placeholder="My Scenario">
    <div class="flex justify-end gap-3">
        <button id="cancelSaveSession" class="px-4 py-2 bg-theme-surface border border-theme-input text-theme-body rounded-lg hover:bg-theme-muted text-sm font-medium transition-colors">Cancel</button>
        <button id="confirmSaveSession" class="px-4 py-2 bg-theme-accent text-theme-on-accent rounded-lg hover:bg-theme-accent-hover text-sm font-medium shadow-sm transition-colors">Save</button>
    </div>
</dialog>

<dialog id="confirmDeleteDialog" class="p-6 rounded-xl shadow-2xl border border-theme-border bg-theme-surface backdrop:bg-theme-page/50 min-w-[320px]">
    <h3 class="text-lg font-bold text-theme-heading mb-2">Delete Session</h3>
    <p id="deleteSessionText" class="text-sm text-theme-muted mb-6">Are you sure you want to delete this session?</p>
    <div class="flex justify-end gap-3">
        <button id="cancelDeleteSession" class="px-4 py-2 bg-theme-surface border border-theme-input text-theme-body rounded-lg hover:bg-theme-muted text-sm font-medium transition-colors">Cancel</button>
        <button id="confirmDeleteSession" class="px-4 py-2 bg-theme-danger-bg text-theme-on-accent rounded-lg hover:bg-theme-danger-hover text-sm font-medium shadow-sm transition-colors">Delete</button>
    </div>
</dialog>

<dialog id="withdrawalChartDialog" class="p-6 rounded-xl shadow-2xl border border-theme-border bg-theme-surface backdrop:bg-theme-page/50 w-[90vw] max-w-4xl h-[80vh] max-h-[800px]">
    <div class="flex flex-col h-full">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h3 class="text-lg font-bold text-theme-heading" id="withdrawalChartDialogTitle">Withdrawal Analysis</h3>
                <div id="withdrawalChartDialogSubtitle" class="text-sm font-normal text-theme-faint mt-1"></div>
            </div>
            <div class="flex items-center gap-4">
                <div id="withdrawalChartDialogAvgReturn" class="text-sm text-theme-faint"></div>
                <button onclick="document.getElementById('withdrawalChartDialog').close()" class="text-theme-faint hover:text-theme-body p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div class="flex-1 relative min-h-0 w-full flex flex-col gap-1">
            <div class="flex-[2] relative min-h-0">
                <canvas id="largeWithdrawalCanvas"></canvas>
            </div>
            <div class="flex-1 relative min-h-0">
                <canvas id="largeBalanceCanvas"></canvas>
            </div>
        </div>
    </div>
</dialog>
