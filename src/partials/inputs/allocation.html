<!-- Allocation rows + mini charts (continues the Asset Allocation section) -->
<div class="pt-4">
    <div class="space-y-1 p-3 border rounded-lg bg-theme-muted">
        <!-- Asset Allocation (with historical data range) -->
        <h3 class="text-lg font-semibold text-theme-body mb-4"
        >Asset Allocation</h3>

        <!-- Year Labels Row -->
        <div class="grid grid-cols-[4.5rem_minmax(0,1fr)] gap-x-2">
            <div></div>
            <div id="year-labels" class="flex justify-between text-xs text-theme-faint px-1 min-w-0"></div>
        </div>
        <div class="grid grid-cols-[4.5rem_minmax(0,1fr)] gap-x-2 items-center">
            <div class="col-span-1">
                <label for="usLgGrowthAllocation" class="block text-xs font-medium text-theme-body leading-tight">US Lg Growth</label>
                <div class="input-adorned has-suffix mt-1">
                    <input type="number" id="usLgGrowthAllocation" class="allocation-input block w-16 rounded-md input-theme text-xs p-1 text-center">
                    <span class="input-adorn-suffix">%</span>
                </div>
            </div>
            <div class="relative h-16 w-full min-w-0">
                <canvas id="us-lg-growth-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
            </div>
        </div>
        <div class="grid grid-cols-[4.5rem_minmax(0,1fr)] gap-x-2 items-center">
            <div class="col-span-1">
                <label for="usLgValueAllocation" class="block text-xs font-medium text-theme-body leading-tight">US Lg Value</label>
                <div class="input-adorned has-suffix mt-1">
                    <input type="number" id="usLgValueAllocation" class="allocation-input block w-16 rounded-md input-theme text-xs p-1 text-center">
                    <span class="input-adorn-suffix">%</span>
                </div>
            </div>
            <div class="relative h-16 w-full min-w-0">
                <canvas id="us-lg-value-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
            </div>
        </div>
        <div class="grid grid-cols-[4.5rem_minmax(0,1fr)] gap-x-2 items-center">
            <div class="col-span-1">
                <label for="usSmMidAllocation" class="block text-xs font-medium text-theme-body leading-tight">US Sm/Mid</label>
                <div class="input-adorned has-suffix mt-1">
                    <input type="number" id="usSmMidAllocation" class="allocation-input block w-16 rounded-md input-theme text-xs p-1 text-center">
                    <span class="input-adorn-suffix">%</span>
                </div>
            </div>
            <div class="relative h-16 w-full min-w-0">
                <canvas id="us-sm-mid-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
            </div>
        </div>
        <div class="grid grid-cols-[4.5rem_minmax(0,1fr)] gap-x-2 items-center">
            <div class="col-span-1">
                <label for="exUsAllocation" class="block text-xs font-medium text-theme-body leading-tight">ex-US Stocks</label>
                <div class="input-adorned has-suffix mt-1">
                    <input type="number" id="exUsAllocation" class="allocation-input block w-16 rounded-md input-theme text-xs p-1 text-center">
                    <span class="input-adorn-suffix">%</span>
                </div>
            </div>
            <div class="relative h-16 w-full min-w-0">
                <canvas id="ex-us-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
            </div>
        </div>
        <div class="grid grid-cols-[4.5rem_minmax(0,1fr)] gap-x-2 items-center">
            <div class="col-span-1">
                <label for="bondAllocation" class="block text-xs font-medium text-theme-body leading-tight">Bonds</label>
                <div class="input-adorned has-suffix mt-1">
                    <input type="number" id="bondAllocation" class="allocation-input block w-16 rounded-md input-theme text-xs p-1 text-center">
                    <span class="input-adorn-suffix">%</span>
                </div>
            </div>
            <div class="relative h-16 w-full min-w-0">
                <canvas id="bond-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
            </div>
        </div>
        <div class="grid grid-cols-[4.5rem_minmax(0,1fr)] gap-x-2 items-center">
           <div class="col-span-1">
                <label for="cashAllocation" class="block text-xs font-medium text-theme-body leading-tight">Cash</label>
                <div class="input-adorned has-suffix mt-1">
                    <input type="number" id="cashAllocation" class="allocation-input block w-16 rounded-md input-theme text-xs p-1 text-center">
                    <span class="input-adorn-suffix">%</span>
                </div>
            </div>
            <div class="relative h-16 w-full min-w-0">
                <canvas id="cash-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
            </div>
        </div>
        <div class="text-left pt-1">
            <p class="text-xs font-semibold">Total: <span id="totalAllocation">100</span>%</p>
        </div>
    </div>
</div>
