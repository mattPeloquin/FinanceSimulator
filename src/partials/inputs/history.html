<!-- Historical Data Section -->
<div class="space-y-4 p-4 border rounded-lg bg-theme-muted">
    <h3 class="font-semibold text-theme-heading">Historical Data Range</h3>
    <p class="text-sm text-theme-muted">Charts and profiles update automatically as you adjust the range.</p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
        <div>
            <label for="startYear" class="block text-sm font-medium text-theme-body">Start Year</label>
            <input type="number" id="startYear" value="1928" class="mt-1 block w-full rounded-md input-theme sm:text-sm p-2">
        </div>
        <div>
            <label for="endYear" class="block text-sm font-medium text-theme-body">End Year</label>
            <input type="number" id="endYear" value="2025" class="mt-1 block w-full rounded-md input-theme sm:text-sm p-2">
        </div>
    </div>
    <p id="historical-range-msg" class="text-xs text-theme-faint text-center mt-2"></p>
</div>
