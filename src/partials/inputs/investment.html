<!-- Investment Planning: Historical Data + Asset Allocation (mirrors Withdrawal Strategy) -->
<details id="section-investment" class="group border rounded-lg bg-theme-accent-subtle/30">
    <summary class="cursor-pointer select-none flex items-center justify-between p-4">
        <h3 class="text-lg font-semibold text-theme-body">Investment Planning</h3>
        <svg class="w-4 h-4 text-theme-faint transition-transform group-open:rotate-180 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
    </summary>
    <div class="space-y-6 px-4 pb-4 pt-1 border-t border-theme-border">

    <!-- Historical Data -->
    <div class="space-y-3">
        <p class="text-sm text-theme-muted pt-3">Select the range of years to use as basis for simulating future returns.</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
            <div>
                <label for="startYear" class="block text-sm font-medium text-theme-body">Start Year</label>
                <input type="number" id="startYear" class="mt-1 block w-full rounded-md input-theme sm:text-sm p-2" step="1">
            </div>
            <div>
                <label for="endYear" class="block text-sm font-medium text-theme-body">End Year</label>
                <input type="number" id="endYear" class="mt-1 block w-full rounded-md input-theme sm:text-sm p-2" step="1">
            </div>
        </div>
        <p id="historical-range-help" class="text-xs text-theme-faint"></p>
        <p id="historical-range-msg" class="text-xs text-theme-faint text-center mt-2"></p>

        <!-- Distribution Method Selector -->
        <fieldset>
            <legend class="font-medium text-theme-body pt-4">Distribution Method</legend>
            <div class="mt-3 grid grid-cols-1 gap-3">
                <label for="dist-resampling" class="relative flex items-start p-3 border rounded-lg cursor-pointer has-[:checked]:bg-theme-accent-subtle has-[:checked]:border-theme-accent">
                    <div class="flex items-center h-5">
                        <input id="dist-resampling" name="distribution-method" type="radio" value="resampling" class="focus:ring-theme-accent h-4 w-4 text-theme-accent border-theme-input">
                    </div>
                    <div class="ml-3 text-sm">
                        <span class="block font-medium text-theme-body">Historical Resampling</span>
                        <span class="block text-theme-faint">Directly sample from historical data, preserving asset correlations.</span>
                    </div>
                </label>
                <div class="space-y-2">
                <label for="dist-scaled-historical" class="relative flex items-start p-3 border rounded-lg cursor-pointer has-[:checked]:bg-theme-accent-subtle has-[:checked]:border-theme-accent">
                    <div class="flex items-center h-5">
                        <input id="dist-scaled-historical" name="distribution-method" type="radio" value="scaledHistorical" class="focus:ring-theme-accent h-4 w-4 text-theme-accent border-theme-input">
                    </div>
                    <div class="ml-3 text-sm">
                        <span class="block font-medium text-theme-body">Smoothed Historical</span>
                        <span class="block text-theme-faint">Reuses real historical year-to-year sequences and correlations, optionally rescaled to your own return/volatility assumptions and lightly smoothed to fill gaps between historical data points.</span>
                    </div>
                </label>
                <label for="dist-lognormal" class="relative flex items-start p-3 border rounded-lg cursor-pointer has-[:checked]:bg-theme-accent-subtle has-[:checked]:border-theme-accent">
                    <div class="flex items-center h-5">
                        <input id="dist-lognormal" name="distribution-method" type="radio" value="lognormal" class="focus:ring-theme-accent h-4 w-4 text-theme-accent border-theme-input">
                    </div>
                    <div class="ml-3 text-sm">
                        <span class="block font-medium text-theme-body">Log-Normal Distribution</span>
                        <span class="block text-theme-faint">Simulate from each asset's Mean and Standard Deviation, correlated using the historical correlation matrix for the selected year range.</span>
                    </div>
                </label>
                {{> lognormal }}
                </div>
            </div>
        </fieldset>
    </div>

    <!-- Asset Allocation -->
    <div id="allocationSparklines" class="space-y-1 pr-4">
        <h4 class="font-medium text-theme-body pt-2 pb-1">Asset Allocation</h4>

        <!-- year labels span the sparkline column only -->
        <div class="grid grid-cols-[6.25rem_3.5rem_minmax(0,1fr)] gap-x-3">
            <div></div>
            <div></div>
            <div class="flex min-w-0 gap-x-1">
                <div id="year-labels" class="flex flex-1 justify-between text-xs text-theme-faint px-1 min-w-0"></div>
                <div class="w-12 shrink-0" aria-hidden="true"></div>
            </div>
        </div>

        <!-- Each row: label on top; % field | avg | sparkline share one baseline (row 2 center) -->
        <div data-alloc-row class="grid grid-cols-[6.25rem_3.5rem_minmax(0,1fr)] grid-rows-[auto_auto] gap-x-3">
            <label for="usLgGrowthAllocation" class="row-start-1 col-start-1 block text-xs font-medium text-theme-body leading-tight">US Lg Growth</label>
            <div class="row-start-2 col-start-1 self-center justify-self-center w-[4.75rem] input-adorned has-suffix">
                <input type="number" id="usLgGrowthAllocation" class="allocation-input block w-full rounded-md input-theme text-xs p-1 text-center">
                <span class="input-adorn-suffix">%</span>
            </div>
            <p class="row-start-2 col-start-2 self-center text-right pr-3 text-xs text-theme-faint tabular-nums leading-none" title="Average real (inflation-adjusted) annual return">
                <span id="usLgGrowthAvgReturn">—</span>%
            </p>
            <div class="row-start-2 col-start-3 relative h-14 min-w-0">
                <div id="usLgGrowthSparkPlot" class="absolute left-0 right-0 h-14 flex gap-x-1 items-stretch" style="top: 0%">
                    <div class="relative h-14 w-full min-w-0 flex-1">
                        <canvas id="us-lg-growth-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
                    </div>
                    <div class="relative h-14 w-12 shrink-0" title="Sparkline high / low (nominal %)">
                        <div id="usLgGrowthRangeCluster" class="absolute left-0 right-0 flex flex-col gap-1 text-[10px] text-theme-faint tabular-nums leading-none -translate-y-1/2" style="top: 50%">
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="usLgGrowthMaxReturn">—</span><span>%</span>
                            </span>
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="usLgGrowthMinReturn">—</span><span>%</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div data-alloc-row class="grid grid-cols-[6.25rem_3.5rem_minmax(0,1fr)] grid-rows-[auto_auto] gap-x-3">
            <label for="usLgValueAllocation" class="row-start-1 col-start-1 block text-xs font-medium text-theme-body leading-tight">US Lg Value</label>
            <div class="row-start-2 col-start-1 self-center justify-self-center w-[4.75rem] input-adorned has-suffix">
                <input type="number" id="usLgValueAllocation" class="allocation-input block w-full rounded-md input-theme text-xs p-1 text-center">
                <span class="input-adorn-suffix">%</span>
            </div>
            <p class="row-start-2 col-start-2 self-center text-right pr-3 text-xs text-theme-faint tabular-nums leading-none" title="Average real (inflation-adjusted) annual return">
                <span id="usLgValueAvgReturn">—</span>%
            </p>
            <div class="row-start-2 col-start-3 relative h-14 min-w-0">
                <div id="usLgValueSparkPlot" class="absolute left-0 right-0 h-14 flex gap-x-1 items-stretch" style="top: 0%">
                    <div class="relative h-14 w-full min-w-0 flex-1">
                        <canvas id="us-lg-value-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
                    </div>
                    <div class="relative h-14 w-12 shrink-0" title="Sparkline high / low (nominal %)">
                        <div id="usLgValueRangeCluster" class="absolute left-0 right-0 flex flex-col gap-1 text-[10px] text-theme-faint tabular-nums leading-none -translate-y-1/2" style="top: 50%">
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="usLgValueMaxReturn">—</span><span>%</span>
                            </span>
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="usLgValueMinReturn">—</span><span>%</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div data-alloc-row class="grid grid-cols-[6.25rem_3.5rem_minmax(0,1fr)] grid-rows-[auto_auto] gap-x-3">
            <label for="usSmMidAllocation" class="row-start-1 col-start-1 block text-xs font-medium text-theme-body leading-tight">US Sm/Mid</label>
            <div class="row-start-2 col-start-1 self-center justify-self-center w-[4.75rem] input-adorned has-suffix">
                <input type="number" id="usSmMidAllocation" class="allocation-input block w-full rounded-md input-theme text-xs p-1 text-center">
                <span class="input-adorn-suffix">%</span>
            </div>
            <p class="row-start-2 col-start-2 self-center text-right pr-3 text-xs text-theme-faint tabular-nums leading-none" title="Average real (inflation-adjusted) annual return">
                <span id="usSmMidAvgReturn">—</span>%
            </p>
            <div class="row-start-2 col-start-3 relative h-14 min-w-0">
                <div id="usSmMidSparkPlot" class="absolute left-0 right-0 h-14 flex gap-x-1 items-stretch" style="top: 0%">
                    <div class="relative h-14 w-full min-w-0 flex-1">
                        <canvas id="us-sm-mid-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
                    </div>
                    <div class="relative h-14 w-12 shrink-0" title="Sparkline high / low (nominal %)">
                        <div id="usSmMidRangeCluster" class="absolute left-0 right-0 flex flex-col gap-1 text-[10px] text-theme-faint tabular-nums leading-none -translate-y-1/2" style="top: 50%">
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="usSmMidMaxReturn">—</span><span>%</span>
                            </span>
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="usSmMidMinReturn">—</span><span>%</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div data-alloc-row class="grid grid-cols-[6.25rem_3.5rem_minmax(0,1fr)] grid-rows-[auto_auto] gap-x-3">
            <label for="exUsAllocation" class="row-start-1 col-start-1 block text-xs font-medium text-theme-body leading-tight">ex-US Stocks</label>
            <div class="row-start-2 col-start-1 self-center justify-self-center w-[4.75rem] input-adorned has-suffix">
                <input type="number" id="exUsAllocation" class="allocation-input block w-full rounded-md input-theme text-xs p-1 text-center">
                <span class="input-adorn-suffix">%</span>
            </div>
            <p class="row-start-2 col-start-2 self-center text-right pr-3 text-xs text-theme-faint tabular-nums leading-none" title="Average real (inflation-adjusted) annual return">
                <span id="exUsAvgReturn">—</span>%
            </p>
            <div class="row-start-2 col-start-3 relative h-14 min-w-0">
                <div id="exUsSparkPlot" class="absolute left-0 right-0 h-14 flex gap-x-1 items-stretch" style="top: 0%">
                    <div class="relative h-14 w-full min-w-0 flex-1">
                        <canvas id="ex-us-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
                    </div>
                    <div class="relative h-14 w-12 shrink-0" title="Sparkline high / low (nominal %)">
                        <div id="exUsRangeCluster" class="absolute left-0 right-0 flex flex-col gap-1 text-[10px] text-theme-faint tabular-nums leading-none -translate-y-1/2" style="top: 50%">
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="exUsMaxReturn">—</span><span>%</span>
                            </span>
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="exUsMinReturn">—</span><span>%</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div data-alloc-row class="grid grid-cols-[6.25rem_3.5rem_minmax(0,1fr)] grid-rows-[auto_auto] gap-x-3">
            <label for="bondAllocation" class="row-start-1 col-start-1 block text-xs font-medium text-theme-body leading-tight">Bonds</label>
            <div class="row-start-2 col-start-1 self-center justify-self-center w-[4.75rem] input-adorned has-suffix">
                <input type="number" id="bondAllocation" class="allocation-input block w-full rounded-md input-theme text-xs p-1 text-center">
                <span class="input-adorn-suffix">%</span>
            </div>
            <p class="row-start-2 col-start-2 self-center text-right pr-3 text-xs text-theme-faint tabular-nums leading-none" title="Average real (inflation-adjusted) annual return">
                <span id="bondAvgReturn">—</span>%
            </p>
            <div class="row-start-2 col-start-3 relative h-14 min-w-0">
                <div id="bondSparkPlot" class="absolute left-0 right-0 h-14 flex gap-x-1 items-stretch" style="top: 0%">
                    <div class="relative h-14 w-full min-w-0 flex-1">
                        <canvas id="bond-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
                    </div>
                    <div class="relative h-14 w-12 shrink-0" title="Sparkline high / low (nominal %)">
                        <div id="bondRangeCluster" class="absolute left-0 right-0 flex flex-col gap-1 text-[10px] text-theme-faint tabular-nums leading-none -translate-y-1/2" style="top: 50%">
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="bondMaxReturn">—</span><span>%</span>
                            </span>
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="bondMinReturn">—</span><span>%</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div data-alloc-row class="grid grid-cols-[6.25rem_3.5rem_minmax(0,1fr)] grid-rows-[auto_auto] gap-x-3">
            <label for="cashAllocation" class="row-start-1 col-start-1 block text-xs font-medium text-theme-body leading-tight">Cash</label>
            <div class="row-start-2 col-start-1 self-center justify-self-center w-[4.75rem] input-adorned has-suffix">
                <input type="number" id="cashAllocation" class="allocation-input block w-full rounded-md input-theme text-xs p-1 text-center">
                <span class="input-adorn-suffix">%</span>
            </div>
            <p class="row-start-2 col-start-2 self-center text-right pr-3 text-xs text-theme-faint tabular-nums leading-none" title="Average real (inflation-adjusted) annual return">
                <span id="cashAvgReturn">—</span>%
            </p>
            <div class="row-start-2 col-start-3 relative h-14 min-w-0">
                <div id="cashSparkPlot" class="absolute left-0 right-0 h-14 flex gap-x-1 items-stretch" style="top: 0%">
                    <div class="relative h-14 w-full min-w-0 flex-1">
                        <canvas id="cash-mini-chart" class="absolute inset-0 w-full h-full"></canvas>
                    </div>
                    <div class="relative h-14 w-12 shrink-0" title="Sparkline high / low (nominal %)">
                        <div id="cashRangeCluster" class="absolute left-0 right-0 flex flex-col gap-1 text-[10px] text-theme-faint tabular-nums leading-none -translate-y-1/2" style="top: 50%">
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="cashMaxReturn">—</span><span>%</span>
                            </span>
                            <span class="flex justify-end items-baseline">
                                <span data-sign class="inline-block w-2 text-right"></span>
                                <span id="cashMinReturn">—</span><span>%</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-left">
            <p class="text-xs font-semibold">Total: <span id="totalAllocation">100</span>%</p>
        </div>
    </div>


    </div>
</details>
