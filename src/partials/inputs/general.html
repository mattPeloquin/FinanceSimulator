<!-- Section 1: General Parameters -->
<div class="border-t pt-6">
    <h2 class="text-lg font-semibold text-theme-body mb-4"
    >Investment Horizon</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
        <div>
            <label for="numYears" class="block text-sm font-medium text-theme-body">Years to simulate</label>
            <input type="number" id="numYears" value="40" class="mt-1 block w-full rounded-md input-theme sm:text-sm p-2">
        </div>
        <div>
            <label for="startBalance" class="block text-sm font-medium text-theme-body">Starting Portfolio</label>
            <div class="input-adorned has-suffix mt-1">
                <input type="text" id="startBalance" value="4,000" class="currency-input block w-full rounded-md input-theme sm:text-sm p-2">
                <span class="input-adorn-suffix">000s</span>
            </div>
        </div>
    </div>
    <details class="group mt-4 border rounded-lg">
        <summary class="cursor-pointer select-none px-4 py-2 text-sm font-medium text-theme-muted flex items-center justify-between">
            <span>Advanced simulation settings</span>
            <svg class="w-4 h-4 text-theme-faint transition-transform group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </summary>
        <div class="px-4 pb-4 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
                <div>
                    <label for="numSimulations" class="block text-sm font-medium text-theme-body">Number of Simulations</label>
                    <input type="number" id="numSimulations" value="10000" class="mt-1 block w-full rounded-md input-theme sm:text-sm p-2">
                </div>
                <div>
                    <label for="randomSeed" class="block text-sm font-medium text-theme-body">Random Seed (optional)</label>
                    <input type="number" id="randomSeed" value="" placeholder="blank = random" class="mt-1 block w-full rounded-md input-theme sm:text-sm p-2">
                </div>
                <div>
                    <label for="smoothWindowPct" class="block text-sm font-medium text-theme-body">Percentile Smoothing (&plusmn;)</label>
                    <div class="input-adorned has-suffix mt-1">
                        <input type="number" id="smoothWindowPct" value="1" min="0" max="5" step="0.5" class="block w-full rounded-md input-theme sm:text-sm p-2">
                        <span class="input-adorn-suffix">%</span>
                    </div>
                    <p class="text-xs text-theme-faint mt-1">Averages a band of runs around each percentile (P10&ndash;P60) to reduce noise. 0 = a single run.</p>
                </div>
            </div>

            <!-- Distribution Method Selector -->
            <fieldset>
                <legend class="text-sm font-medium text-theme-body">Distribution Method</legend>
                <div class="mt-3 grid grid-cols-1 gap-3">
                    <label for="dist-resampling" class="relative flex items-start p-3 border rounded-lg cursor-pointer has-[:checked]:bg-theme-accent-subtle has-[:checked]:border-theme-accent">
                        <div class="flex items-center h-5">
                            <input id="dist-resampling" name="distribution-method" type="radio" value="resampling" class="focus:ring-theme-accent h-4 w-4 text-theme-accent border-theme-input" checked>
                        </div>
                        <div class="ml-3 text-sm">
                            <span class="block font-medium text-theme-body">Historical Resampling</span>
                            <span class="block text-theme-faint">Directly sample from historical data, preserving asset correlations.</span>
                        </div>
                    </label>
                    <label for="dist-lognormal" class="relative flex items-start p-3 border rounded-lg cursor-pointer has-[:checked]:bg-theme-accent-subtle has-[:checked]:border-theme-accent">
                        <div class="flex items-center h-5">
                            <input id="dist-lognormal" name="distribution-method" type="radio" value="lognormal" class="focus:ring-theme-accent h-4 w-4 text-theme-accent border-theme-input">
                        </div>
                        <div class="ml-3 text-sm">
                            <span class="block font-medium text-theme-body">Log-Normal Distribution</span>
                            <span class="block text-theme-faint">Simulate from each asset's Mean and Standard Deviation, correlated using the historical correlation matrix for the selected year range.</span>
                            <p class="text-xs text-theme-faint mt-1">Block / Smoothing adds year-to-year persistence (serial correlation); set it to 1 for fully independent years.</p>
                        </div>
                    </label>
                </div>
            </fieldset>

            <!-- Block size: bootstraps blocks (resampling) and smooths years (log-normal) -->
            <div id="resampling-profiles" class="flex items-center gap-3 p-3 border rounded-lg bg-theme-muted" title="Resampling: samples consecutive blocks of years to preserve historical cycles. Log-Normal: adds year-to-year smoothing (serial correlation).">
                <label for="blockSize" class="text-sm font-medium text-theme-body whitespace-nowrap">Block / Smoothing (yrs)</label>
                <input type="range" id="blockSizeSlider" min="1" max="15" value="2" class="flex-1 h-2 bg-theme-border rounded-lg appearance-none cursor-pointer accent-theme-accent">
                <input type="number" id="blockSize" value="2" min="1" max="15" class="w-16 rounded-md input-theme sm:text-sm p-1 text-center">
            </div>
        </div>
    </details>
</div>
