<!-- Section 1: General Parameters -->
<div class="border-t pt-6">
    <h2 class="text-lg font-semibold text-theme-body mb-4"
    >Investment Horizon</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
        <div>
            <label for="numYears" class="block text-sm font-medium text-theme-body">Years to simulate</label>
            <input type="number" id="numYears" class="mt-1 block w-full rounded-md input-theme sm:text-sm p-2">
        </div>
        <div>
            <label for="startBalance" class="block text-sm font-medium text-theme-body">Starting Portfolio</label>
            <div class="input-adorned has-suffix mt-1">
                <input type="text" id="startBalance" class="currency-input block w-full rounded-md input-theme sm:text-sm p-2">
                <span class="input-adorn-suffix">000s</span>
            </div>
        </div>
    </div>
    <details class="group mt-4 border rounded-lg">
        <summary class="cursor-pointer select-none px-4 py-2 text-sm font-medium text-theme-muted flex items-center justify-between">
            <span>Advanced simulation settings</span>
            <svg class="w-4 h-4 text-theme-faint transition-transform group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </summary>
        <div class="px-4 pb-4 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
                <div>
                    <label for="numSimulations" class="block text-sm font-medium text-theme-body">Number of Simulations</label>
                    <input type="number" id="numSimulations" class="mt-1 block w-full rounded-md input-theme sm:text-sm p-2">
                </div>
                <div>
                    <label for="randomSeed" class="block text-sm font-medium text-theme-body">Random Seed (optional)</label>
                    <input type="number" id="randomSeed" placeholder="blank = random" class="mt-1 block w-full rounded-md input-theme sm:text-sm p-2">
                </div>
                <div>
                    <label for="smoothWindowPct" class="block text-sm font-medium text-theme-body">Percentile Smoothing (&plusmn;)</label>
                    <div class="input-adorned has-suffix mt-1">
                        <input type="number" id="smoothWindowPct" min="0" max="5" step="0.5" class="block w-full rounded-md input-theme sm:text-sm p-2">
                        <span class="input-adorn-suffix">%</span>
                    </div>
                    <p class="text-xs text-theme-faint mt-1">Averages a band of runs around each percentile (P10&ndash;P60) to reduce noise. 0 = a single run.</p>
                </div>
            </div>

            <!-- Persistence knob: average run length (resampling) and smoothing strength (log-normal) -->
            <div id="resampling-profiles" class="p-3 border rounded-lg bg-theme-muted space-y-2" title="Resampling: draws runs of consecutive years averaging this length to preserve historical cycles, with no rigid block boundaries. Log-Normal: adds year-to-year smoothing (serial correlation).">
                <div class="flex items-center gap-3">
                    <label for="blockSize" class="text-sm font-medium text-theme-body whitespace-nowrap">Persistence (avg yrs)</label>
                    <input type="range" id="blockSizeSlider" min="1" max="6" class="flex-1 h-2 bg-theme-border rounded-lg appearance-none cursor-pointer accent-theme-accent">
                    <input type="number" id="blockSize" min="1" max="6" class="w-16 rounded-md input-theme sm:text-sm p-1 text-center">
                </div>
                <p class="text-xs text-theme-faint">Adds year-to-year persistence by drawing runs of consecutive years averaging this length; set to 1 for fully independent years.</p>
            </div>
        </div>
    </details>
</div>
