<!-- Log-Normal Parameters -->
<div id="lognormal-profiles" class="form-section-hidden space-y-3 pt-2">
    <h2 class="text-lg font-semibold text-theme-body">Log-Normal Distribution Parameters</h2>
    <div class="space-y-4 p-4 border border-theme-border rounded-lg">
        <h3 class="font-semibold text-theme-heading">Stock Profiles</h3>
         <div class="grid grid-cols-3 gap-x-4 gap-y-2 text-sm items-center">
            <span class="font-medium text-theme-faint">Category</span><span class="font-medium text-theme-faint">Mean</span><span class="font-medium text-theme-faint">Std Dev</span>
            <label class="font-medium text-theme-body">US Lg Growth</label><input type="number" step="0.1" id="usLgGrowthMean" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1"><input type="number" step="0.1" id="usLgGrowthStdDev" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1">
            <label class="font-medium text-theme-body">US Lg Value</label><input type="number" step="0.1" id="usLgValueMean" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1"><input type="number" step="0.1" id="usLgValueStdDev" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1">
            <label class="font-medium text-theme-body">US Sm/Mid</label><input type="number" step="0.1" id="usSmMidMean" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1"><input type="number" step="0.1" id="usSmMidStdDev" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1">
            <label class="font-medium text-theme-body">ex-US</label><input type="number" step="0.1" id="exUsMean" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1"><input type="number" step="0.1" id="exUsStdDev" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1">
        </div>
    </div>
     <div class="space-y-4 p-4 border border-theme-border rounded-lg">
        <h3 class="font-semibold text-theme-heading">Other Profiles</h3>
         <div class="grid grid-cols-3 gap-x-4 gap-y-2 text-sm items-center">
            <span class="font-medium text-theme-faint">Category</span><span class="font-medium text-theme-faint">Mean</span><span class="font-medium text-theme-faint">Std Dev</span>
            <label class="font-medium text-theme-body">Bonds</label><input type="number" step="0.1" id="bondReturnMean" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1"><input type="number" step="0.1" id="bondReturnStdDev" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1">
            <label class="font-medium text-theme-body">Cash</label><input type="number" step="0.1" id="cashReturnMean" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1"><input type="number" step="0.1" id="cashReturnStdDev" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1">
            <label class="font-medium text-theme-body">Inflation</label><input type="number" step="0.1" id="inflationMean" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1"><input type="number" step="0.1" id="inflationStdDev" class="pct-input block w-full rounded-md input-theme sm:text-sm p-1">
        </div>
    </div>
</div>
